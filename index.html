<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモンクイズ</title>
    <style>
        :root { --primary: #ef5350; --bg: #f0f2f5; }
        body { text-align: center; font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        #quiz-container { background: white; margin: 0 auto; padding: 20px; max-width: 400px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .warning { font-size: 0.75em; color: #666; margin-bottom: 10px; line-height: 1.4; }
        #stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; color: #444; }
        img { width: 100%; max-width: 200px; height: auto; background: #f9f9f9; border-radius: 50%; margin: 10px 0; }
        input { padding: 12px; width: 85%; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 12px 24px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; width: 92%; transition: 0.2s; margin: 5px 0; }
        button:active { transform: scale(0.98); }
        .btn-small { padding: 8px 16px; width: 45%; font-size: 0.9em; display: inline-block; margin: 2%; }
        #result { margin-top: 15px; font-size: 1.1em; font-weight: bold; min-height: 1.5em; }
        #description { margin-top: 15px; font-size: 0.85em; color: #444; text-align: left; background: #fffde7; padding: 12px; border-radius: 10px; display: none; white-space: pre-wrap; }
        .mode-select, .region-select { padding: 10px; }
    </style>
</head>
<body>

<div class="warning">
    アプリを閉じたり更新するとリセットされます<br>
    <strong>💡 ひらがな・カタカナどちらでもOK！</strong>
</div>

<div id="quiz-container">
    <div id="quiz-content">
        <div class="mode-select">
            <h2>モードをえらんでね</h2>
            <button onclick="selectMode('name')">なまえをあてる</button>
            <button onclick="selectMode('type')">タイプをあてる</button>
        </div>
    </div>
</div>

<script>
    let quizMode = "";
    let minId = 1;
    let maxId = 1025;
    let currentPokemonName = "";
    let currentPokemonTypes = [];
    let questionCount = 0;
    let correctCount = 0;
    let isAnswered = false;
    let usedIds = [];

    const typeTranslations = {
        normal: "ノーマル", fire: "ほのお", water: "みず", grass: "くさ", electric: "でんき",
        ice: "こおり", fighting: "かくとう", poison: "どく", ground: "じめん", flying: "ひこう",
        psychic: "エスパー", bug: "むし", rock: "いわ", ghost: "ゴースト", dragon: "ドラゴン",
        steel: "はがね", fairy: "フェアリー", dark: "あく"
    };

    function toKatakana(str) { return str.replace(/[ぁ-ん]/g, s => String.fromCharCode(s.charCodeAt(0) + 0x60)); }
    function toHiragana(str) { return str.replace(/[ァ-ン]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60)); }

    function selectMode(mode) {
        quizMode = mode;
        document.getElementById('quiz-content').innerHTML = `
            <div class="region-select">
                <h2>ちほうをえらんでね</h2>
                <button class="btn-small" onclick="startGame(1, 151)">カントー</button>
                <button class="btn-small" onclick="startGame(152, 251)">ジョウト</button>
                <button class="btn-small" onclick="startGame(252, 386)">ホウエン</button>
                <button class="btn-small" onclick="startGame(387, 493)">シンオウ</button>
                <button class="btn-small" onclick="startGame(494, 649)">イッシュ</button>
                <button class="btn-small" onclick="startGame(650, 721)">カロス</button>
                <button class="btn-small" onclick="startGame(722, 809)">アローラ</button>
                <button class="btn-small" onclick="startGame(810, 898)">ガラル</button>
                <button class="btn-small" onclick="startGame(899, 1025)">パルデア・他</button>
                <button style="background:#555" onclick="startGame(1, 1025)">ぜんこく図鑑</button>
            </div>
        `;
    }

    function startGame(min, max) {
        minId = min;
        maxId = max;
        document.getElementById('quiz-container').innerHTML = `
            <div id="stats">
                <span>問目: <span id="q-count">1</span> / 10</span>
                <span>正解: <span id="c-count">0</span></span>
            </div>
            <div id="quiz-main">
                <img id="poke-img" src="" alt="ポケモン">
                <input type="text" id="answer-input" placeholder="${quizMode === 'name' ? 'なまえを入力' : 'タイプを入力'}" autocomplete="off">
                <button id="btn-action" onclick="checkAnswer()">決定！</button>
                <div id="result"></div>
                <div id="description"></div>
            </div>
        `;
        nextPokemon();
    }

    async function nextPokemon() {
        if (questionCount >= 10) {
            showFinalResult();
            return;
        }
        isAnswered = false;
        questionCount++;
        document.getElementById('q-count').innerText = questionCount;
        document.getElementById('result').innerText = "読み込み中...";
        document.getElementById('description').style.display = "none";
        const input = document.getElementById('answer-input');
        input.value = "";
        input.disabled = false;
        const btn = document.getElementById('btn-action');
        btn.innerText = "決定！";
        btn.onclick = checkAnswer;

        let id;
        const rangeSize = maxId - minId + 1;
        do {
            id = Math.floor(Math.random() * rangeSize) + minId;
        } while (usedIds.includes(id));
        usedIds.push(id);

        try {
            const resSpecies = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}/`);
            const dataSpecies = await resSpecies.json();
            currentPokemonName = dataSpecies.names.find(n => n.language.name === "ja").name;
            const flavor = dataSpecies.flavor_text_entries.find(f => f.language.name === "ja");
            
            const resPoke = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}/`);
            const dataPoke = await resPoke.json();
            currentPokemonTypes = dataPoke.types.map(t => typeTranslations[t.type.name]);

            document.getElementById('poke-img').src = dataPoke.sprites.front_default || "";
            document.getElementById('result').innerText = "";
            document.getElementById('description').innerText = 
                `名前: ${currentPokemonName}\nタイプ: ${currentPokemonTypes.join('・')}\n\n${flavor ? flavor.flavor_text.replace(/\f/g, ' ') : "説明なし"}`;
            input.focus();
        } catch (e) {
            usedIds.pop();
            questionCount--;
            nextPokemon();
        }
    }

    function checkAnswer() {
        if (isAnswered) return;
        const input = document.getElementById('answer-input');
        const rawInput = input.value.trim();
        const resDiv = document.getElementById('result');
        let isCorrect = false;

        if (quizMode === 'name') {
            isCorrect = (toKatakana(rawInput) === toKatakana(currentPokemonName));
        } else {
            const hiraInput = toHiragana(rawInput);
            const kataInput = toKatakana(rawInput);
            isCorrect = currentPokemonTypes.some(t => (hiraInput === toHiragana(t) || kataInput === toKatakana(t)));
        }

        if (isCorrect) {
            resDiv.innerText = "◯ 正解！";
            resDiv.style.color = "#4caf50";
            correctCount++;
            document.getElementById('c-count').innerText = correctCount;
        } else {
            const correctText = quizMode === 'name' ? currentPokemonName : currentPokemonTypes.join('・');
            resDiv.innerText = "× 正解は「" + correctText + "」";
            resDiv.style.color = "#f44336";
        }

        document.getElementById('description').style.display = "block";
        isAnswered = true;
        input.disabled = true;
        const btn = document.getElementById('btn-action');
        btn.innerText = "次へすすむ";
        btn.onclick = nextPokemon;
        btn.focus();
    }

    function showFinalResult() {
        const rate = (correctCount / 10) * 100;
        document.getElementById('quiz-container').innerHTML = `
            <div class="final-screen">
                <h2>結果発表</h2>
                <h1 style="font-size: 3em; color: ${rate >= 90 ? '#4caf50' : '#f44336'}">${rate}%</h1>
                <p>10問中 ${correctCount}問正解</p>
                <button onclick="location.reload()">タイトルへもどる</button>
            </div>
        `;
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const btn = document.getElementById('btn-action');
            if (btn) btn.click();
        }
    });
</script>
</body>
</html>
